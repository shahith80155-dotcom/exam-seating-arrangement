<!DOCTYPE html>
<html>
<head>
    <title>Classroom Setup</title>
    <link rel="stylesheet" href="class.css">
</head>

<body>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="classroom-container">

    <h1>Classroom Setup 🚀</h1>
    <p class="subtitle">Configure rooms and seating</p>

    <input type="number" id="roomCount" placeholder="Number of Classrooms" min="1">
    <input type="number" id="bench" placeholder="Students per Bench" min="1">

    <div class="mode">
        <label class="radio-card">
            <input type="radio" name="mode" value="normal" checked>
            <span>🚀 Normal</span>
        </label>

        <label class="radio-card">
            <input type="radio" name="mode" value="dept">
            <span>🏫 Department</span>
        </label>
    </div>

    <button onclick="generateRooms()">Generate</button>

    <div id="rooms"></div>

    <button onclick="saveDetails()" class="primary">Save</button>
    <button onclick="deleteAllClassrooms()" class="danger">Delete All</button>

    <p id="msg"></p>

    <!-- ✅ BACK BUTTON -->
    <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

</div>

<script>
let user = localStorage.getItem("user")
if(!user) window.location.href = "login.html"

function goBack(){
    window.location.href = "dashboard.html"
}

function deleteAllClassrooms(){
    fetch("https://exam-seating-arrangement-k7ln.onrender.com/delete-all-classrooms", {
        method: "DELETE"
    })
    .then(res => res.text())
    .then(msg => {
        document.getElementById("msg").innerText = msg
        setTimeout(() => location.reload(), 1000)
    })
}

function generateRooms(){

    let count = document.getElementById("roomCount").value
    let container = document.getElementById("rooms")
    let mode = document.querySelector("input[name='mode']:checked").value

    if(!count || count <= 0){
        alert("Enter valid classroom count ❌")
        return
    }

    container.innerHTML = ""

    for(let i=1;i<=count;i++){
        container.innerHTML += `
        <div class="room-box">
            <h3>Room ${i}</h3>

            <input type="text" id="name${i}" placeholder="Room Name">

            <input type="number" id="rows${i}" placeholder="Rows" min="1">
            <input type="number" id="cols${i}" placeholder="Columns" min="1">

            ${mode === "dept" ? `
            <div class="dept">
                <label class="chip">
                    <input type="checkbox" class="dept${i}" value="CSE">
                    <span>CSE</span>
                </label>
                <label class="chip">
                    <input type="checkbox" class="dept${i}" value="IT">
                    <span>IT</span>
                </label>
                <label class="chip">
                    <input type="checkbox" class="dept${i}" value="ECE">
                    <span>ECE</span>
                </label>
                <label class="chip">
                    <input type="checkbox" class="dept${i}" value="MECH">
                    <span>MECH</span>
                </label>
            </div>
            ` : ""}
        </div>`
    }
}

function saveDetails(){

    let count = document.getElementById("roomCount").value
    let bench = document.getElementById("bench").value
    let msg = document.getElementById("msg")
    let mode = document.querySelector("input[name='mode']:checked").value

    if(!count || !bench || count <= 0 || bench <= 0){
        msg.innerText = "Enter valid positive values ❌"
        msg.style.color = "red"
        return
    }

    let rooms = []

    for(let i=1;i<=count;i++){

        let rows = document.getElementById("rows"+i).value
        let cols = document.getElementById("cols"+i).value

        if(!rows || !cols || rows <= 0 || cols <= 0){
            msg.innerText = "Rows & Columns must be > 0 ❌"
            msg.style.color = "red"
            return
        }

        let allowed_depts = []

        if(mode === "dept"){
            document.querySelectorAll(".dept"+i+":checked")
            .forEach(cb => allowed_depts.push(cb.value))

            if(allowed_depts.length === 0){
                msg.innerText = "Select departments ❌"
                msg.style.color = "red"
                return
            }
        }

        rooms.push({
            room_name: document.getElementById("name"+i).value || ("Room "+i),
            row_count: rows,
            col_count: cols,
            allowed_depts
        })
    }

    fetch("https://exam-seating-arrangement-k7ln.onrender.com/save-classrooms",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({bench, rooms, mode})
    })
    .then(res=>res.text())
    .then(data=>{
        msg.innerText = data
        msg.style.color = "green"
    })
}
</script>

</body>
</html>
