<!DOCTYPE html>
<html>
<head>
    <title>View Seating</title>
    <style>
        body { font-family: Arial; }
        .row { display: flex; }
        .bench {
            border: 1px solid black;
            padding: 10px;
            margin: 5px;
            width: 160px;
            text-align: center;
            background: #f5f5f5;
            font-size: 13px;
        }
    </style>
</head>
<body>

<h1>Seating Arrangement</h1>
<div id="container"></div>

<script>

let data = JSON.parse(localStorage.getItem("seating"))
console.log("FULL DATA:", data) // ✅ DEBUG

let container = document.getElementById("container")

if(!data){
    container.innerHTML = "<h2>No data ❌ Click Generate Seating</h2>"
}
else {

    // ✅ SEATING
    data.seating.forEach(room => {

        let title = document.createElement("h2")
        title.innerText = "Room " + room.room
        container.appendChild(title)

        room.layout.forEach(row => {

            let rowDiv = document.createElement("div")
            rowDiv.className = "row"

            row.forEach(col => {

                let benchDiv = document.createElement("div")
                benchDiv.className = "bench"

                benchDiv.innerHTML = col.map(s =>
                    s === "Empty"
                    ? "Empty"
                    : s.replace(/\n/g, "<br>")
                ).join("<hr>")

                rowDiv.appendChild(benchDiv)
            })

            container.appendChild(rowDiv)
        })
    })

    // ✅ UNSEATED STUDENTS
    if(data.unseated && data.unseated.length > 0){

        let title = document.createElement("h2")
        title.innerText = "Unseated Students"
        container.appendChild(title)

        data.unseated.forEach(s => {
            let p = document.createElement("p")
            p.innerText = s
            container.appendChild(p)
        })
    }
    else {
        let msg = document.createElement("h3")
        msg.innerText = "All students seated ✅"
        container.appendChild(msg)
    }
    // ✅ ROOM DEPARTMENT LIST
if(data.roomDeptList){

    let title = document.createElement("h2")
    title.innerText = "Room-wise Department List"
    container.appendChild(title)

    data.roomDeptList.forEach(room => {

        let roomTitle = document.createElement("h3")
        roomTitle.innerText = "Room " + room.room
        container.appendChild(roomTitle)

        for(let dept in room.departments){

            let deptTitle = document.createElement("h4")
            deptTitle.innerText = dept
            container.appendChild(deptTitle)

            room.departments[dept].forEach(student => {
                let p = document.createElement("p")
                p.innerText = student
                container.appendChild(p)
            })
        }
    })
}
}

</script>

</body>
</html>
