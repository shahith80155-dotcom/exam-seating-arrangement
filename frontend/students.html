<!DOCTYPE html>
<html>
<head>
<title>Upload Student List</title>

<link rel="stylesheet" href="student.css">
</head>

<body>

<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="students-container">

<h2>Upload Students 🚀</h2>

<select id="dept">
<option value="">Select Department</option>
<option>CSE</option>
<option>ECE</option>
<option>IT</option>
<option>MECH</option>
<option>CIVIL</option>
</select>

<label class="file-upload">
    <input type="file" id="regularFile" accept=".csv"
           onchange="validateFile(this,'file1')">
    <span class="btn-text">Choose File</span>
    <span id="file1" class="file-name">No file chosen</span>
</label>

<select onchange="showArrear(this.value)">
<option value="no">No Arrear</option>
<option value="yes">Arrear Students</option>
</select>

<div id="arrearSection" style="display:none;">

<select id="arrearDept">
<option value="">Select Department</option>
<option>CSE</option>
<option>ECE</option>
<option>IT</option>
<option>MECH</option>
<option>CIVIL</option>
</select>

<label class="file-upload">
    <input type="file" id="arrearFile" accept=".csv"
           onchange="validateFile(this,'file2')">
    <span class="btn-text">Choose File</span>
    <span id="file2" class="file-name">No file chosen</span>
</label>

</div>

<button class="upload-btn" onclick="uploadStudents()">Upload Students</button>

<button class="delete-btn" onclick="deleteAllStudents()">Delete All Students</button>

<button class="sample-btn" onclick="showSample()">View Sample Format</button>

<p id="msg"></p>

<button class="back-btn" onclick="goBack()">← Back to Dashboard</button>

</div>

<!-- SAMPLE -->
<div id="sampleBox" class="sample-box">
    <div class="sample-content">
        <h3>Sample CSV Format</h3>

<pre>
name,regno,subject,dept,type
Arun Kumar,1001,CS101,CSE,regular
Sneha Reddy,1002,CS102,CSE,regular
Kiran Kumar,1003,CS103,CSE,regular
</pre>

        <button onclick="closeSample()">Close</button>
    </div>
</div>

<script>

/* FILE VALIDATION */
function validateFile(input,id){
    let file = input.files[0]

    if(file){
        if(!file.name.endsWith(".csv")){
            alert("Only CSV files allowed ❌")
            input.value=""
            document.getElementById(id).innerText="No file chosen"
            return
        }
        document.getElementById(id).innerText=file.name
    }
}

/* SHOW ARREAR */
function showArrear(val){
    document.getElementById("arrearSection").style.display =
        val==="yes" ? "block":"none"
}

/* SAMPLE POPUP */
function showSample(){
    document.getElementById("sampleBox").style.display="flex"
}
function closeSample(){
    document.getElementById("sampleBox").style.display="none"
}

/* DELETE */
function deleteAllStudents(){
    fetch("https://exam-seating-arrangement-k7ln.onrender.com/delete-all-students",{
        method:"DELETE"
    })
    .then(res=>res.text())
    .then(msg=>{
        let el = document.getElementById("msg")
        el.innerText=msg
        setTimeout(()=>location.reload(),1000)
    })
}

/* 🔥 IMPROVED UPLOAD */
function uploadStudents(){

let dept=document.getElementById("dept").value
let file=document.getElementById("regularFile").files[0]
let arrearFile=document.getElementById("arrearFile").files[0]
let arrearDept=document.getElementById("arrearDept").value

let msg=document.getElementById("msg")
let btn=document.querySelector(".upload-btn")

if(dept==="" || !file){
    msg.innerText="Select department & file ❌"
    msg.style.color="red"
    return
}

/* 🔄 LOADING STATE */
btn.disabled = true
btn.innerText = "Uploading..."
msg.innerText="Uploading..."
msg.style.color="white"

let formData=new FormData()
formData.append("dept",dept)
formData.append("regularFile",file)

/* add arrear if exists */
if(arrearFile){
    formData.append("arrearFile",arrearFile)
    formData.append("arrearDept",arrearDept)
}

fetch("https://exam-seating-arrangement-k7ln.onrender.com/upload-students",{
    method:"POST",
    body:formData
})
.then(res=>res.text())
.then(data=>{

    msg.innerText=data
    msg.style.color="lightgreen"

    /* ✅ RESET FILES */
    document.getElementById("regularFile").value=""
    document.getElementById("file1").innerText="No file chosen"

    document.getElementById("arrearFile").value=""
    document.getElementById("file2").innerText="No file chosen"

    /* ✅ RESET BUTTON */
    btn.disabled = false
    btn.innerText = "Upload Students"

    /* ✅ AUTO CLEAR MESSAGE */
    setTimeout(()=>{
        msg.innerText=""
    },3000)

})
.catch(()=>{
    msg.innerText="Upload failed ❌"
    msg.style.color="red"

    btn.disabled = false
    btn.innerText = "Upload Students"

    setTimeout(()=>{
        msg.innerText=""
    },3000)
})
}

/* BACK */
function goBack(){
    window.location.href="dashboard.html"
}

</script>

</body>
</html>
