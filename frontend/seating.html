<!DOCTYPE html>
<html>
<head>
    <title>Generate Seating</title>
    <link rel="stylesheet" href="seating.css">
</head>

<body>

<div class="container">

    <h1>⚙️ Generate Seating</h1>
    <p class="subtitle">Smart exam seating system</p>

    <div class="card">

        <!-- MODE -->
        <div class="mode-box">
            <p class="mode-title">Select Mode</p>

            <label class="radio">
                <input type="radio" name="mode" value="normal" checked>
                <span>Normal Mode</span>
            </label>

            <label class="radio">
                <input type="radio" name="mode" value="strict">
                <span>Strict Mode</span>
            </label>
        </div>

        <!-- INFO -->
        <div class="info-box">
            <p>✔ Normal → same subject CAN sit together</p>
            <p>✔ Strict → no same subject adjacent (may leave empty seats)</p>
        </div>

        <!-- EXTRA ROOMS -->
        <label class="option">
            <input type="checkbox" id="extraRoom">
            Add Extra Rooms
        </label>

        <div id="extraInputs" class="extra-box">

            <input type="number" id="roomCount" placeholder="Number of Rooms" min="1">

            <div id="roomFields"></div>

        </div>

        <!-- BUTTON -->
        <button class="btn" onclick="generateSeating()">Generate Seating</button>
        <button class="btn secondary" onclick="goToView()">View Seating</button>

        <p id="msg"></p>

    </div>

</div>

<script>

// 🔐 Auth check
let user = localStorage.getItem("user")
if(!user) window.location.href = "login.html"

// SHOW EXTRA INPUTS
document.getElementById("extraRoom").addEventListener("change", function () {
    document.getElementById("extraInputs").style.display =
        this.checked ? "flex" : "none"
})

// CREATE ROOM INPUTS
document.getElementById("roomCount").addEventListener("input", function(){

    let count = this.value
    let container = document.getElementById("roomFields")

    container.innerHTML = ""

    for(let i = 1; i <= count; i++){

        container.innerHTML += `
            <div class="room-card">
                <input type="text" placeholder="Room ${i} Name" id="roomName${i}">
                <input type="number" placeholder="Rows" id="rows${i}">
                <input type="number" placeholder="Cols" id="cols${i}">
                <input type="number" placeholder="Bench" id="bench${i}" value="1">
            </div>
        `
    }
})

// MAIN FUNCTION
function generateSeating(){

    let msg = document.getElementById("msg")
    let allowExtra = document.getElementById("extraRoom").checked
    let mode = document.querySelector('input[name="mode"]:checked').value
    let strict = mode === "strict"

    msg.innerText = "Generating..."
    msg.style.color = "white"

    let extraRooms = []

    if(allowExtra){

        let count = document.getElementById("roomCount").value

        if(!count){
            msg.innerText = "Enter number of rooms ❌"
            msg.style.color = "red"
            return
        }

        for(let i = 1; i <= count; i++){

            let name = document.getElementById(`roomName${i}`).value
            let rows = document.getElementById(`rows${i}`).value
            let cols = document.getElementById(`cols${i}`).value
            let bench = document.getElementById(`bench${i}`).value || 1

            if(!name || !rows || !cols){
                msg.innerText = `Fill all fields for Room ${i} ❌`
                msg.style.color = "red"
                return
            }

            extraRooms.push({
                room_name: name,
                row_count: parseInt(rows),
                col_count: parseInt(cols),
                bench: parseInt(bench)
            })
        }
    }

    fetch("https://exam-seating-arrangement-k7ln.onrender.com/generate-seating", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            strict,
            extraRooms
        })
    })
    .then(res => res.json())
    .then(data => {

        localStorage.setItem("seating", JSON.stringify(data))

        if(strict){
            msg.innerText = "Strict mode applied ⚠️ (some seats may be empty)"
            msg.style.color = "orange"
        } else {
            msg.innerText = "Normal mode applied ✅"
            msg.style.color = "lightgreen"
        }
    })
    .catch(() => {
        msg.innerText = "Error generating ❌"
        msg.style.color = "red"
    })
}

// VIEW PAGE
function goToView(){
    window.location.href = "view.html"
}

</script>

</body>
</html>
