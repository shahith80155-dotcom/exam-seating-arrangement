<!DOCTYPE html>
<html>
<head>
    <title>Generate Seating</title>
    <link rel="stylesheet" href="seating.css">
</head>

<body>

<!-- 🌠 Shooting Stars -->
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="container">

    <h1>Generate Seating ⚙️</h1>
    <p class="subtitle">Create seating arrangement easily</p>

    <!-- EXTRA ROOM -->
    <label class="checkbox-container">
        <input type="checkbox" id="extraRoom">
        <span class="checkmark"></span>
        <span class="label-text">Add Extra Room</span>
    </label>

    <!-- STRICT MODE -->
    <label class="checkbox-container">
        <input type="checkbox" id="strictMode">
        <span class="checkmark"></span>
        <span class="label-text">Strict Mode (No same subject adjacent)</span>
    </label>

    <!-- INFO TEXT -->
    <p style="font-size:12px;color:gray;">
        Normal mode may place same subject students together
    </p>

    <!-- Extra Inputs -->
    <div id="extraInputs" class="extra-box" style="display:none;">
        <input type="number" id="extraRows" placeholder="Rows" min="1">
        <input type="number" id="extraCols" placeholder="Columns" min="1">
        <input type="number" id="extraBench" placeholder="Bench" value="1" min="1">
    </div>

    <!-- Buttons -->
    <button onclick="generateSeating()">Generate Seating</button>
    <button onclick="goToView()" class="view-btn">View Seating</button>

    <p id="msg"></p>

    <!-- BACK BUTTON -->
    <button class="back-btn" onclick="goDashboard()">← Back to Dashboard</button>

</div>

<script>

// 🔐 Protect page
let user = localStorage.getItem("user")
if(!user) window.location.href = "login.html"

// SHOW / HIDE EXTRA INPUTS
document.getElementById("extraRoom").addEventListener("change", function () {
    let box = document.getElementById("extraInputs")
    box.style.display = this.checked ? "flex" : "none"
})

// GENERATE FUNCTION
function generateSeating() {

    let allowExtra = document.getElementById("extraRoom").checked
    let strictMode = document.getElementById("strictMode").checked
    let msg = document.getElementById("msg")

    // ✅ CONFIRMATION FOR NORMAL MODE
    if(!strictMode){
        let confirmNormal = confirm(
            "Normal Mode:\nSame subject students MAY sit adjacent.\n\nDo you want to continue?"
        )

        if(!confirmNormal){
            return
        }
    }

    // API URL
    let url = `https://exam-seating-arrangement-k7ln.onrender.com/generate-seating?extra=${allowExtra}&strict=${strictMode}`

    // EXTRA ROOM VALIDATION
    if (allowExtra) {

        let rows = document.getElementById("extraRows").value
        let cols = document.getElementById("extraCols").value
        let bench = document.getElementById("extraBench").value || 1

        if (!rows || !cols) {
            msg.innerText = "Enter rows and columns ❌"
            msg.style.color = "red"
            return
        }

        if (rows <= 0 || cols <= 0 || bench <= 0) {
            msg.innerText = "Values must be greater than 0 ❌"
            msg.style.color = "red"
            return
        }

        url += `&rows=${rows}&cols=${cols}&bench=${bench}`
    }

    msg.innerText = "Generating seating..."
    msg.style.color = "white"

    fetch(url)
    .then(res => res.json())
    .then(data => {

        localStorage.removeItem("seating")
        localStorage.setItem("seating", JSON.stringify(data))

        // MODE MESSAGE
        if(data.mode === "STRICT"){
            msg.innerText = "Strict mode applied ⚠️ Some seats may be empty"
            msg.style.color = "orange"
        }else{
            msg.innerText = "Seating generated successfully ✅ (All seats filled)"
            msg.style.color = "lightgreen"
        }
    })
    .catch(() => {
        msg.innerText = "Error generating seating ❌"
        msg.style.color = "red"
    })
}

// VIEW PAGE
function goToView(){
    window.location.href = "view.html"
}

// BACK TO DASHBOARD
function goDashboard(){
    window.location.href = "/dashboard.html"
}

</script>

</body>
</html>
