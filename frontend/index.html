<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>Welcome</h1>
        <p>In this universe, every seat finds its place.</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="box">

            <h2>Login</h2>

            <div class="input-group">
                <span>👤</span>
                <input type="text" id="username" placeholder="Email" oninput="clearMsg()">
            </div>

            <div class="input-group">
                <span>🔒</span>
                <input type="password" id="password" placeholder="Password" oninput="clearMsg()">
            </div>

            <button onclick="login()">Login</button>

            <div class="actions">
                <span onclick="window.location.href='forgot.html'">Forgot Password</span>
                <span onclick="window.location.href='register.html'">Create Account</span>
            </div>

            <p id="msg"></p>

        </div>
    </div>

</div>

<script>
function clearMsg(){
    document.getElementById("msg").innerText = ""
}
</script>

<!-- 🔥 FIREBASE LOGIN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAecbhpVI_RswN56YnpqFsXRCnlgd7jHp4",
  authDomain: "exam-seat-system-f2416.firebaseapp.com",
  projectId: "exam-seat-system-f2416",
  storageBucket: "exam-seat-system-f2416.firebasestorage.app",
  messagingSenderId: "727460801338",
  appId: "1:727460801338:web:f4fef4ceb2efdbe814fe03"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ LOGIN FUNCTION
window.login = function(){

let email = document.getElementById("username").value;
let password = document.getElementById("password").value;
let msgBox = document.getElementById("msg");

if(email.trim() === "" || password.trim() === ""){
    msgBox.innerText = "All fields required ❌";
    msgBox.style.color = "red";
    return;
}

msgBox.innerText = "Checking...";

signInWithEmailAndPassword(auth, email, password)
.then(() => {

    msgBox.innerText = "Login successful ✅";
    msgBox.style.color = "#00ffcc";

    localStorage.setItem("user", email);

    setTimeout(()=>{
        window.location.href = "dashboard.html";
    },1000);

})
.catch((error) => {
    msgBox.innerText = error.message;
    msgBox.style.color = "red";
});

}

</script>

</body>
</html>
