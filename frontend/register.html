<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#0b0b1f;
    color:white;
}
.box{
    background: rgba(255,255,255,0.05);
    padding:20px;
    width:320px;
    margin:auto;
    margin-top:80px;
    border-radius:15px;
    box-shadow:0 0 20px purple;
}
input{
    width:90%;
    padding:10px;
    margin:8px;
    border:none;
    border-radius:8px;
}
button{
    padding:10px 20px;
    margin:10px;
    background:linear-gradient(90deg,#a020f0,#ff00cc);
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}
.error{
    color:red;
    font-size:12px;
}
.success{
    color:#00ffcc;
}
</style>

</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input type="text" id="fname" placeholder="First Name"><br>
<input type="text" id="lname" placeholder="Last Name"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="register()">Register</button>

<p onclick="window.location.href='index.html'" style="cursor:pointer;color:#aaa;">
Back to Login
</p>

<p id="msg"></p>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAecbhpVI_RswN56YnpqFsXRCnlgd7jHp4",
  authDomain: "exam-seat-system-f2416.firebaseapp.com",
  projectId: "exam-seat-system-f2416",
  storageBucket: "exam-seat-system-f2416.firebasestorage.app",
  messagingSenderId: "727460801338",
  appId: "1:727460801338:web:f4fef4ceb2efdbe814fe03"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ REGISTER FUNCTION
window.register = function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let msg = document.getElementById("msg");

if(email === "" || password === ""){
    msg.innerText = "Fill all fields ❌";
    msg.style.color = "red";
    return;
}

createUserWithEmailAndPassword(auth, email, password)
.then(() => {

    msg.innerText = "Account created successfully ✅";
    msg.className = "success";

    setTimeout(()=>{
        window.location.href = "index.html";
    },1500);

})
.catch((error) => {
    msg.innerText = error.message;
    msg.className = "error";
});

}

</script>

</body>
</html>
